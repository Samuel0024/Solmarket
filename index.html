<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #9945FF;
  --accent: #14F195;
  --orange: #FF6B00;
  --red: #E8001C;
  --bg: #F5F5F5;
  --white: #FFFFFF;
  --dark: #1A1A1A;
  --muted: #888;
  --border: #E8E8E8;
  --sol-grad: linear-gradient(135deg,#9945FF 0%,#14F195 100%);
}
body {
  background: #111;
  display: flex;
  justify-content: center;
  min-height: 100vh;
  font-family: 'DM Sans', sans-serif;
  overscroll-behavior: none;
}
::-webkit-scrollbar { width: 0; height: 0; }

/* ── Keyframes ── */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes slideUp { from { transform: translateY(80px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes slideDown { from { transform: translateX(-50%) translateY(-16px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
@keyframes trackMove { 0%{width:0} 100%{width:var(--tw)} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

/* ── App Shell ── */
#app {
  max-width: 480px;
  width: 100%;
  margin: 0 auto;
  background: var(--bg);
  min-height: 100vh;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 80px rgba(0,0,0,0.5);
  /* FIX: prevent layout shift/shaking from modals */
  isolation: isolate;
}

/* ── Typography ── */
.font-syne { font-family: 'Syne', sans-serif; }
button { font-family: 'DM Sans', sans-serif; }
input, textarea, select { font-family: 'DM Sans', sans-serif; }
select option { background: #fff; }

/* ── Overlay / Modal ── */
.overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.65);
  z-index: 99999;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.sheet {
  width: 100%;
  max-width: 480px;
  background: var(--white);
  border-radius: 24px 24px 0 0;
  padding: 20px 20px 40px;
  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp 0.28s cubic-bezier(.34,1.56,.64,1);
  position: relative;
}
.sheet-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 18px;
}

/* ── Cards ── */
.card {
  background: var(--white);
  border-radius: 14px;
  border: 1px solid var(--border);
}

/* ── Wallet Connect Animation ── */
.wallet-btn {
  background: #F8F8F8;
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 14px 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  transition: border-color 0.2s, transform 0.15s, background 0.2s;
}
.wallet-btn:hover {
  border-color: var(--primary);
  background: #FAF5FF;
  transform: translateY(-1px);
}
.wallet-btn:active { transform: scale(0.97); }

/* ── Shimmer loading ── */
.shimmer {
  background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}

/* ── Track Steps ── */
.track-step { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; }
.track-dot {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 2px;
}
.track-line { width: 2px; height: 32px; margin-left: 15px; }

/* ── Badge ── */
.badge {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 6px;
  font-size: 11px; font-weight: 700;
  text-transform: capitalize;
}

/* ── Toast ── */
.toast {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 99999;
  border-radius: 20px;
  padding: 10px 22px;
  font-weight: 700;
  font-size: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  white-space: nowrap;
  animation: slideDown 0.3s ease;
  max-width: 440px;
}

/* ── Bottom Nav ── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--white);
  border-top: 1.5px solid var(--border);
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  z-index: 300;
  /* FIX: prevent nav from causing reflow */
  will-change: transform;
}
.nav-btn {
  background: none;
  border: none;
  padding: 10px 0 8px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  position: relative;
}

/* ── Product card ── */
.prod-card {
  background: var(--white);
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.prod-card:active { transform: scale(0.97); }

/* ── Input base ── */
.inp {
  width: 100%;
  background: #F8F8F8;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 14px;
  color: var(--dark);
  outline: none;
  transition: border-color 0.2s;
}
.inp:focus { border-color: var(--primary); }
.inp.err { border-color: var(--red); background: #FFF5F5; }

/* ── Solid Button ── */
.sol-btn {
  padding: 13px 24px;
  border-radius: 12px;
  border: none;
  background: var(--sol-grad);
  color: white;
  font-weight: 800;
  font-size: 14px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.sol-btn:hover { opacity: 0.9; transform: translateY(-1px); }
.sol-btn:active { transform: scale(0.97); }
.sol-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ── Outline Button ── */
.out-btn {
  padding: 10px 18px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: white;
  color: var(--dark);
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  transition: border-color 0.2s;
  font-family: 'DM Sans', sans-serif;
}
.out-btn:hover { border-color: var(--primary); }

/* ── Auth Forms ── */
.auth-tab {
  flex: 1; padding: 10px 0; border: none; background: none;
  font-weight: 700; font-size: 14px; cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
}
.auth-tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}
</style>
</head>

async function fetchSolPrice() {
  if (solPriceFetching) return;
  solPriceFetching = true;
  try {
    const r = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=ngn,usd", {cache:"no-store"});

    SOL_PRICE_NGN = d?.solana?.ngn || null;
    SOL_PRICE_USD = d?.solana?.usd || null;
  } catch(e) {
    // fallback: use approximate rate if API fails
    SOL_PRICE_NGN = SOL_PRICE_NGN || 200000; // ~200k NGN fallback
  } finally {
    solPriceFetching = false;
  }
}

function ngnToSol(ngn) {
  if (!SOL_PRICE_NGN || SOL_PRICE_NGN <= 0) return null;
  return ngn / SOL_PRICE_NGN;
}

function solPriceLabel() {

// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════
// STATE MANAGEMENT
// ═══════════════════════════════════════════════════════════════
let renderScheduled = false;

function setState(updates) {
  Object.assign(state, updates);
  persistState();
  if (!renderScheduled) {
    renderScheduled = true;
    requestAnimationFrame(() => {
      renderScheduled = false;
      render();
      if (state.modal) _mountModal();
    });
  }
}

function persistState() {
  saveStore({
    user: state.user,
    orders: state.orders,
    cart: state.cart,
    adminApps: state.adminApps,
    sellerProducts: state.sellerProducts,
  });
}

function notify(msg, type="success") {
  setState({_toast:{msg,type}});
  clearTimeout(state._toastTimer);
  state._toastTimer = setTimeout(() => { state._toast = null; render(); }, 3000);
}

// Modal DOM node — mounted directly on body to fix the floating/shaking bug
let _modalNode = null;

function openModal(name, data=null) {
  state.modal = name;
  state.modalData = data;
  persistState();
  _mountModal();
}

function closeModal() {
  state.modal = null;
  state.modalData = null;
  _unmountModal();
  persistState();
  render();
}

function _mountModal() {
  _unmountModal();
  const node = _buildModal();
  if (!node) return;
  _modalNode = node;
  document.body.appendChild(_modalNode);
}

function _unmountModal() {
  if (_modalNode && _modalNode.parentNode) {
    _modalNode.parentNode.removeChild(_modalNode);
  }
  _modalNode = null;
}

function _buildModal() {
  if (state.modal === "wallet") return WalletModal();
  if (state.modal === "product") return ProductModal();
  if (state.modal === "track") return TrackModal();
  if (state.modal === "cart") return CartModal();
  if (state.modal === "profile") return ProfileModal();
  if (state.modal === "merchant" && state.wallet) return MerchantModal();
  if (state.modal === "adminLogin") return AdminLoginModal();
  return null;
}

function openScreen(name, tab=null) {
  setState({screen:name, screenTab:tab});
}

function closeScreen() {
  setState({screen:null, screenTab:null});
}

// ═══════════════════════════════════════════════════════════════
// SOLANA WALLET CONNECTION
// ═══════════════════════════════════════════════════════════════
async function connectWallet(walletInfo) {
  const provider = walletInfo.provider;

  // If no real wallet detected, simulate connection (dev/demo mode)
  if (!provider) {
    setState({walletConnecting:true, walletConnectingName:walletInfo.name});
    await new Promise(r => setTimeout(r, 1200));
    const mockAddr = "Demo" + Math.random().toString(36).slice(2,6).toUpperCase() + "111111111111111111111111111111";
    finishWalletConnect(mockAddr, walletInfo.name + " (Demo)");
    return;
  }

  try {
    setState({walletConnecting:true, walletConnectingName:walletInfo.name});
    let resp;
    if (provider.connect) {
      resp = await provider.connect();
    } else {
      throw new Error("Wallet not available");
    }
    const pubkey = resp.publicKey?.toString() || resp.toString();
    finishWalletConnect(pubkey, walletInfo.name);
  } catch(err) {
    setState({walletConnecting:false, walletConnectingName:null});
    notify("Wallet connection cancelled or failed", "error");
  }
}

// ═══════════════════════════════════════════════════════════════
// SOLANA TRANSACTION — send SOL to merchant wallet
// ═══════════════════════════════════════════════════════════════
async function sendSolPayment(toWallet, solAmount) {
  // Find active provider
  const wInfo = WALLET_PROVIDERS.find(w => w.name === state.walletName);
  const provider = wInfo?.provider;
  if (!provider) throw new Error("No wallet provider found");

  const connection = new solanaWeb3.Connection(
    "https://api.mainnet-beta.solana.com",
    "confirmed"
  );
  const lamports = Math.round(solAmount * solanaWeb3.LAMPORTS_PER_SOL);
  const fromPubkey = new solanaWeb3.PublicKey(state.wallet);
  const toPubkey = new solanaWeb3.PublicKey(toWallet);

  const transaction = new solanaWeb3.Transaction().add(
    solanaWeb3.SystemProgram.transfer({ fromPubkey, toPubkey, lamports })
  );
  const { blockhash, lastValidBlockHeight } = await connection.getLatestBlockhash();
  transaction.recentBlockhash = blockhash;
  transaction.feePayer = fromPubkey;

  // signAndSendTransaction (Phantom) or sign+send (Solflare)
  let txSig;
  if (provider.signAndSendTransaction) {
    const { signature } = await provider.signAndSendTransaction(transaction);
    txSig = signature;
  } else if (provider.signTransaction) {
    const signed = await provider.signTransaction(transaction);
    txSig = await connection.sendRawTransaction(signed.serialize());
  } else {
    throw new Error("Wallet does not support signing");
  }

  await connection.confirmTransaction({signature:txSig, blockhash, lastValidBlockHeight}, "confirmed");
  return txSig;
}

// ORDERS
// ═══════════════════════════════════════════════════════════════
async function placeOrder(product, qty, solAmount, txSig) {
  if (!state.wallet) { closeModal(); openModal("wallet"); return; }
  const trackId = genTrackId();
  const txHash = txSig || genTxHash();
  const order = {
    id: Date.now(),
    trackId,
    txHash,
    product: {...product},
    qty,
    total: product.price * qty,
    solAmount: solAmount || ngnToSol(product.price * qty),
    merchantWallet: product.sellerWallet || null,
    buyerWallet: state.wallet,
    buyerUsername: state.user?.username || shortAddr(state.wallet),
    status: "placed",
    stageIndex: 0,
    stages: [
      {key:"placed", ts: new Date().toLocaleString(), note:"Payment sent on Solana — TX confirmed on-chain"},
    ],
    createdAt: new Date().toISOString(),
  };
  const newOrders = [order, ...state.orders];
  setState({orders: newOrders});
  persistState();
  simulateOrderProgress(order.id);
  return order;
}

function simulateOrderProgress(orderId) {
  const delays = [3000, 8000, 15000, 25000]; // ms delays for each stage
  TRACK_STAGES.slice(1).forEach((stage, i) => {
    setTimeout(() => {
      setState({
        orders: state.orders.map(o => {
          if (o.id !== orderId) return o;
          if (o.stageIndex >= i+1) return o; // already past
          const newStages = [...o.stages, {key:stage.key, ts:new Date().toLocaleString(), note:getStageNote(stage.key)}];
          return {...o, status:stage.key, stageIndex:i+1, stages:newStages};
        })
      });
    }, delays[i]);
  });
}

function getStageNote(key) {
  const notes = {
    confirmed: "Payment locked in escrow on Solana blockchain",
    packed: "Seller has packed your order and ready for pickup",
    shipped: "Package picked up by courier • Track via waybill",
    delivered: "Package delivered! Escrow released to seller ✓",
  };
  return notes[key] || "";
}

// ═══════════════════════════════════════════════════════════════
// DOM HELPERS
// ═══════════════════════════════════════════════════════════════
function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else if (k === "class") e.className = v;
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  for (const child of children) {
    if (child == null || child === false) continue;
    if (typeof child === "string" || typeof child === "number") e.appendChild(document.createTextNode(String(child)));
    else if (child instanceof Node) e.appendChild(child);
  }
  return e;
}

function div(cls, ...children) { return el("div", {class:cls}, ...children); }
function span(cls, txt) { return el("span", {class:cls}, txt); }
function btn(cls, txt, onClick) { return el("button", {class:cls, onClick}, txt); }

function Field({label, value, onChange, placeholder, type="text", multiline, required}) {
  const wrap = el("div");
  wrap.appendChild(el("label",{style:{color:MUTED,fontSize:"13px",display:"block",marginBottom:"5px",fontWeight:"600"}},label+(required?" *":"")));
  let input;
  if (multiline) {
    input = el("textarea",{class:"inp",placeholder,rows:"3",style:{resize:"vertical"}});
    input.value = value||"";
  } else {
    input = el("input",{class:"inp",type,placeholder});
    input.value = value||"";
  }
  input.addEventListener("input", e => onChange(e.target.value));
  wrap.appendChild(input);
  return wrap;
}

      done.appendChild(el("div",{style:{color:MUTED,fontSize:"11px",marginTop:"6px"}},`TX: ${order.txHash.slice(0,16)}...`));
      const trackRow = el("div",{style:{marginTop:"10px",padding:"10px",background:"white",borderRadius:"10px",border:"1px solid #E8E8E8"}});
      trackRow.appendChild(el("div",{style:{fontSize:"11px",color:MUTED}},"Tracking ID"));
      trackRow.appendChild(el("div",{style:{fontWeight:"800",color:PRIMARY,fontSize:"16px",fontFamily:"Syne,sans-serif",letterSpacing:"0.5px"}},order.trackId));
      done.appendChild(trackRow);
      const trackBtn = el("button",{class:"sol-btn",style:{width:"100%",marginTop:"12px",fontSize:"14px"},onClick:()=>{
        closeModal();
        setTimeout(()=>openModal("track",order),300);
      }},"📦 Track My Order");
      done.appendChild(trackBtn);
    }
    content.appendChild(done);
  } else {
    const buyBtn = el("button",{class:"sol-btn",style:{width:"100%",padding:"16px",fontSize:"16px",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px",marginBottom:"10px"}});
    if (loading) {
      buyBtn.appendChild(Spinner("#fff",20));
      buyBtn.appendChild(document.createTextNode(" Sending SOL…"));
    } else {
      const solAmt2 = ngnToSol(product.price * qty);
      const btnLabel = state.wallet
        ? `Pay ${solAmt2 ? fmtSOL(solAmt2) : "…"} — ${fmtN(product.price*qty)}`
        : "Connect Wallet to Buy";
      buyBtn.appendChild(document.createTextNode(btnLabel));
    }
    buyBtn.addEventListener("click", async () => {
      if (!state.wallet) { closeModal(); setTimeout(()=>openModal("wallet"),300); return; }
      const solAmt3 = ngnToSol(product.price * qty);
      if (!solAmt3) { notify("SOL price unavailable. Try again in a moment.", "error"); return; }

      setUI({loading:true});
      try {
        // Determine recipient: merchant's wallet, or fall back to a platform wallet
        const recipientWallet = product.sellerWallet || "7tsf2T6S9bPPVSwT4AqaWRTDuneeiy5362BgQnA3shcL";

        let txSig;
        // Try real transaction; if wallet not available / demo, simulate
        const wInfo = WALLET_PROVIDERS.find(w => w.name === state.walletName);
        if (wInfo?.provider && !state.wallet.startsWith("Demo")) {
          txSig = await sendSolPayment(recipientWallet, solAmt3);
        } else {
          // Demo mode — simulate delay
          await new Promise(r => setTimeout(r, 2000));
          txSig = genTxHash();
        }

        const order = await placeOrder(product, qty, solAmt3, txSig);
        state._lastOrder = order;
        setUI({loading:false, ordered:true});
        notify("Payment sent on Solana! 🎉");
      } catch(err) {
        setUI({loading:false});
        const msg = err?.message || "Transaction failed";
        notify(msg.includes("rejected") ? "Transaction rejected by wallet" : "Payment failed: " + msg.slice(0,40), "error");
      }
    });
    content.appendChild(buyBtn);

    const cartBtn = el("button",{class:"out-btn",style:{width:"100%"},onClick:()=>{
      addToCart(product,qty);
      closeModal();
    }},"🛒 Add to Cart");
    content.appendChild(cartBtn);
  }

  return BottomSheet({onClose:()=>{state._productUI=null;closeModal();}, title:null, sub:null, children:[content]});
}

  prodRow.appendChild(el("div",{style:{fontSize:"36px",width:"50px",height:"50px",background:"white",borderRadius:"10px",display:"flex",alignItems:"center",justifyContent:"center",border:`1px solid ${BORDER_C}`,flexShrink:"0"}},order.product.img));

  pInfo.appendChild(el("div",{style:{fontWeight:"700",color:DARK,fontSize:"13px",lineHeight:"1.3"}},order.product.name.slice(0,40)+(order.product.name.length>40?"...":"")));
  const priceInfo = el("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginTop:"4px",flexWrap:"wrap"}});
  priceInfo.appendChild(el("span",{style:{color:ORANGE,fontWeight:"900",fontSize:"14px",fontFamily:"Syne,sans-serif"}},fmtN(order.total)));
  if (order.solAmount) priceInfo.appendChild(el("span",{style:{background:PRIMARY+"15",color:PRIMARY,borderRadius:"6px",padding:"2px 7px",fontSize:"11px",fontWeight:"700"}},"◎ "+fmtSOL(order.solAmount)+" paid"));
  pInfo.appendChild(priceInfo);
  prodRow.appendChild(pInfo);
  content.appendChild(prodRow);

  // Progress bar
  const progressBar = el("div",{style:{marginBottom:"20px"}});
  const barWrap = el("div",{style:{display:"flex",alignItems:"center",gap:"0",marginBottom:"8px"}});
  TRACK_STAGES.forEach((stage,i) => {
    const active = i <= stageIdx;
    const dot = el("div",{style:{width:"28px",height:"28px",borderRadius:"50%",background:active?stage.color:"#E8E8E8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",flexShrink:"0",transition:"background 0.4s",zIndex:"1"}},active?stage.icon:"");
    barWrap.appendChild(dot);
    if (i < TRACK_STAGES.length-1) {
      const line = el("div",{style:{flex:"1",height:"3px",background:i<stageIdx?"#14F195":"#E8E8E8",transition:"background 0.5s"}});
      barWrap.appendChild(line);
    }
  });
  progressBar.appendChild(barWrap);

  // Stage labels
  const labelRow = el("div",{style:{display:"flex",justifyContent:"space-between"}});
  TRACK_STAGES.forEach((stage,i) => {
    const active = i <= stageIdx;
    const lbl = el("div",{style:{fontSize:"9px",color:active?DARK:MUTED,fontWeight:active?"700":"400",textAlign:"center",maxWidth:"52px",lineHeight:"1.2"}},stage.label);
    labelRow.appendChild(lbl);
  });
  progressBar.appendChild(labelRow);
  content.appendChild(progressBar);

  // Timeline
  const timeline = el("div",{style:{marginBottom:"16px"}});
  timeline.appendChild(el("div",{style:{fontWeight:"700",color:DARK,fontSize:"14px",marginBottom:"12px"}},"Order Timeline"));
  [...order.stages].reverse().forEach((s,i) => {
    const stageDef = TRACK_STAGES.find(t=>t.key===s.key);
    const row = el("div",{style:{display:"flex",gap:"12px",marginBottom:"12px",alignItems:"flex-start"}});
    const dotWrap = el("div",{style:{display:"flex",flexDirection:"column",alignItems:"center"}});
    const dot = el("div",{style:{width:"32px",height:"32px",borderRadius:"50%",background:i===0?`${stageDef?.color||PRIMARY}15`:BORDER_C,border:`2px solid ${i===0?stageDef?.color||PRIMARY:BORDER_C}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",flexShrink:"0"}},stageDef?.icon||"📋");
    dotWrap.appendChild(dot);
    row.appendChild(dotWrap);
    const txt = el("div",{style:{flex:"1"}});
    txt.appendChild(el("div",{style:{fontWeight:"700",color:i===0?DARK:MUTED,fontSize:"13px"}},stageDef?.label||s.key));
    txt.appendChild(el("div",{style:{color:MUTED,fontSize:"11px",marginTop:"2px"}},s.note));
    txt.appendChild(el("div",{style:{color:MUTED,fontSize:"10px",marginTop:"2px"}},s.ts));
    row.appendChild(txt);
    timeline.appendChild(row);
  });
  content.appendChild(timeline);

  // Back button to search
  const backBtn = el("button",{class:"out-btn",style:{width:"100%"},onClick:()=>setState({modalData:null})},"← Track Another Order");
  content.appendChild(backBtn);

  return BottomSheet({onClose:()=>{state._trackUI=null;closeModal();},title:null,sub:null,children:[content]});
}

// MODAL: Cart
// ═══════════════════════════════════════════════════════════════
function CartModal() {
  const cart = state.cart;
  const content = el("div",{style:{display:"flex",flexDirection:"column",gap:"0"}});

  if (cart.length === 0) {
    const empty = el("div",{style:{textAlign:"center",padding:"30px 0"}});
    empty.appendChild(el("div",{style:{fontSize:"56px",marginBottom:"12px"}},"🛒"));
    empty.appendChild(el("div",{style:{fontWeight:"800",color:DARK,fontSize:"16px",marginBottom:"6px"}},"Your cart is empty"));
    empty.appendChild(el("div",{style:{color:MUTED,fontSize:"13px"}},"Add some items to get started"));
    content.appendChild(empty);
  } else {
    cart.forEach(item => {
      const row = el("div",{style:{display:"flex",gap:"12px",padding:"12px 0",borderBottom:`1px solid ${BORDER_C}`,alignItems:"center"}});
      row.appendChild(el("div",{style:{fontSize:"36px",width:"50px",height:"50px",background:"#F8F8F8",borderRadius:"10px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:"0"}},item.product.img));
      const info = el("div",{style:{flex:"1"}});
      info.appendChild(el("div",{style:{fontWeight:"600",color:DARK,fontSize:"13px",lineHeight:"1.3"}},item.product.name.slice(0,35)+"..."));
      info.appendChild(el("div",{style:{color:ORANGE,fontWeight:"900",fontSize:"14px",marginTop:"4px"}},fmtN(item.product.price*item.qty)));
      info.appendChild(el("div",{style:{color:MUTED,fontSize:"11px"}},"Qty: "+item.qty));
      row.appendChild(info);
      const rmBtn = el("button",{style:{background:"#FFF0F0",border:"none",borderRadius:"8px",width:"32px",height:"32px",cursor:"pointer",color:RED,fontSize:"16px",flexShrink:"0"},onClick:()=>removeFromCart(item.product.id)},"×");
      row.appendChild(rmBtn);
      content.appendChild(row);
    });

    const totalRow = el("div",{style:{display:"flex",justifyContent:"space-between",padding:"14px 0",borderTop:`2px solid ${BORDER_C}`,marginTop:"8px"}});
    totalRow.appendChild(el("div",{style:{fontWeight:"700",color:DARK,fontSize:"15px"}},"Total"));
    const totalRight = el("div",{style:{textAlign:"right"}});
    totalRight.appendChild(el("div",{style:{fontWeight:"900",color:ORANGE,fontSize:"18px",fontFamily:"Syne,sans-serif"}},fmtN(cartTotal())));
    const cartSol = ngnToSol(cartTotal());
    if (cartSol) totalRight.appendChild(el("div",{style:{color:PRIMARY,fontSize:"12px",fontWeight:"700"}},"◎ "+fmtSOL(cartSol)));
    totalRow.appendChild(totalRight);
    content.appendChild(totalRow);

    const checkoutBtn = el("button",{class:"sol-btn",style:{width:"100%",padding:"16px",fontSize:"16px",marginTop:"8px"}});
    const cartSolLabel = cartSol ? ` (◎ ${fmtSOL(cartSol)})` : "";
    checkoutBtn.textContent = "Pay "+fmtN(cartTotal())+cartSolLabel;
    checkoutBtn.addEventListener("click", async () => {
      if (!state.wallet) { closeModal(); setTimeout(()=>openModal("wallet"),300); return; }
      checkoutBtn.disabled = true;
      checkoutBtn.textContent = "Sending…";
      try {
        const cartItems = [...state.cart];
        const totalNgn = cartTotal();
        const totalSol = ngnToSol(totalNgn);
        // Send combined SOL to platform wallet (in production, split per merchant)
        const recipientWallet = "7tsf2T6S9bPPVSwT4AqaWRTDuneeiy5362BgQnA3shcL";
        let txSig;
        const wInfo = WALLET_PROVIDERS.find(w => w.name === state.walletName);
        if (wInfo?.provider && !state.wallet.startsWith("Demo") && totalSol) {
          txSig = await sendSolPayment(recipientWallet, totalSol);
        } else {
          await new Promise(r => setTimeout(r, 1500));
          txSig = genTxHash();
        }
        for (const item of cartItems) {
          await placeOrder(item.product, item.qty, ngnToSol(item.product.price*item.qty), txSig);
        }
        setState({cart:[]});
        closeModal();
        notify(`${cartItems.length} order(s) sent on-chain! 🎉`);
      } catch(err) {
        checkoutBtn.disabled = false;
        checkoutBtn.textContent = "Pay "+fmtN(cartTotal())+cartSolLabel;
        notify("Checkout failed: "+(err?.message||"unknown").slice(0,40), "error");
      }
    });
    content.appendChild(checkoutBtn);
  }

  return BottomSheet({onClose:closeModal,title:"My Cart",sub:`${cart.length} item(s)`,children:[content]});
}

      const row=el("div",{style:{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${BORDER_C}`}});
      row.appendChild(el("span",{style:{color:MUTED,fontSize:"13px"}},k));
      row.appendChild(el("span",{style:{fontWeight:"700",color:DARK,fontSize:"13px"}},v));
      summary.appendChild(row);
    });
    content.appendChild(summary);

    const agreeLabel=el("label",{style:{display:"flex",alignItems:"center",gap:"10px",cursor:"pointer"}});
    const chk=el("input",{type:"checkbox",style:{width:"18px",height:"18px",accentColor:PRIMARY}});
    chk.checked=form.agree;
    chk.addEventListener("change",e=>setState({merchantForm:{...state.merchantForm,agree:e.target.checked}}));
    agreeLabel.appendChild(chk);
    agreeLabel.appendChild(el("span",{style:{color:MUTED,fontSize:"13px"}},"I agree to the Merchant Terms & 0.1 SOL refundable bond"));
    content.appendChild(agreeLabel);
  }

  if (loading) {
    const spinWrap=el("div",{style:{textAlign:"center",padding:"24px 0"}});
    spinWrap.appendChild(Spinner(PRIMARY,32));
    spinWrap.appendChild(el("div",{style:{color:MUTED,fontSize:"14px",marginTop:"12px"}},"Submitting to Solana..."));
    content.appendChild(spinWrap);
  } else {
    const btnRow=el("div",{style:{display:"flex",gap:"10px",marginTop:"8px"}});
    if (step>1) {
      const backB=el("button",{class:"out-btn",style:{flex:"1"},onClick:()=>setState({merchantStep:step-1})},"Back");
      btnRow.appendChild(backB);
    }
    const nextB=el("button",{class:"sol-btn",style:{flex:"2"}});
    nextB.textContent=step===3?"Sign & Submit":"Continue →";
    nextB.disabled=step===3&&!form.agree;
    nextB.addEventListener("click",()=>{
      if (step<3) setState({merchantStep:step+1});
      else {
        setState({merchantLoading:true});
        setTimeout(()=>{
          const newApp={id:Date.now(),wallet:state.wallet,name:form.storeName,category:form.category,desc:form.desc,email:form.email,status:"pending",date:"Today"};
          setState({merchantLoading:false,merchantStatus:"pending",merchantStep:1,adminApps:[...state.adminApps,newApp]});
          closeModal();
          notify("Application submitted! Admin will review shortly");
        },2000);
      }
    });
    btnRow.appendChild(nextB);
    content.appendChild(btnRow);
  }

  return BottomSheet({
    onClose:()=>{setState({merchantStep:1});closeModal();},
    title:"Become a Seller",
    sub:`Step ${step} of 3`,
    children:[content]
  });
}

// MODAL: Admin Login
// ═══════════════════════════════════════════════════════════════
function AdminLoginModal() {
  const inp = el("input",{class:`inp${state.adminCodeErr?" err":""}`,type:"password",placeholder:"Admin code..."});
  inp.value = state.adminCode;
  const attempt = () => {
    if (state.adminCode===ADMIN_CODE) {
      closeModal();
      setTimeout(()=>openScreen("admin"),300);
      setState({adminCode:"",adminCodeErr:false});
    } else {
      setState({adminCodeErr:true});
      setTimeout(()=>setState({adminCodeErr:false}),1500);
    }
  };
  inp.addEventListener("input",e=>setState({adminCode:e.target.value}));
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter") attempt(); });

  const errDiv = state.adminCodeErr ? el("div",{style:{color:RED,fontSize:"12px",marginTop:"6px",fontWeight:"600"}},"Invalid admin code") : null;
  const btn2 = el("button",{class:"sol-btn",style:{width:"100%",marginTop:"14px"},onClick:attempt},"Access Admin Panel");

  return BottomSheet({onClose:()=>{setState({adminCode:"",adminCodeErr:false});closeModal();},title:"Admin Access",sub:"Enter your secret admin code",children:[inp,errDiv,btn2]});
}

        notify(`${app.name} rejected`,"error");
      }},"✗ Reject");
      btns.append(approveBtn,rejectBtn);
      card.appendChild(btns);
    }
    list.appendChild(card);
  });
  panel.appendChild(list);
  return panel;
}

    // Add product form
    const form = state.addProductForm;
    const addBox = el("div",{style:{background:"#F8F8F8",borderRadius:"14px",padding:"16px",marginBottom:"16px",border:`1.5px dashed ${BORDER_C}`}});
    addBox.appendChild(el("div",{style:{fontWeight:"700",color:DARK,marginBottom:"12px",fontSize:"14px"}},"+ Add New Product"));
    addBox.appendChild(Field({label:"Product Name",value:form.name,placeholder:"e.g. Premium Sneakers",required:true,onChange:v=>setState({addProductForm:{...state.addProductForm,name:v}})}));
    const row2 = el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginTop:"8px"}});
    row2.appendChild(Field({label:"Price (₦)",value:form.price,placeholder:"50000",type:"number",onChange:v=>setState({addProductForm:{...state.addProductForm,price:v}})}));
    row2.appendChild(Field({label:"Stock",value:form.stock,placeholder:"100",type:"number",onChange:v=>setState({addProductForm:{...state.addProductForm,stock:v}})}));
    addBox.appendChild(row2);
    const catSel = el("select",{class:"inp",style:{marginTop:"8px"},onChange:e=>setState({addProductForm:{...state.addProductForm,cat:e.target.value}})});
    CATS.slice(1).forEach(c=>{const o=el("option");o.value=c;o.textContent=c;catSel.appendChild(o);});
    catSel.value=form.cat;
    addBox.appendChild(catSel);

    const emojiRow = el("div",{style:{display:"flex",flexWrap:"wrap",gap:"8px",marginTop:"8px"}});
    ["📱","💻","👟","🎮","🏠","📦","🧴","📷","🎵","🔋"].forEach(e=>{
      const eb = el("button",{style:{fontSize:"22px",padding:"4px 8px",border:`2px solid ${form.emoji===e?PRIMARY:BORDER_C}`,borderRadius:"8px",background:"white",cursor:"pointer"},onClick:()=>setState({addProductForm:{...state.addProductForm,emoji:e}})},e);
      emojiRow.appendChild(eb);
    });
    addBox.appendChild(emojiRow);

    const submitProd = el("button",{class:"sol-btn",style:{width:"100%",marginTop:"12px",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"}});
    if (state.addProductLoading) { submitProd.appendChild(Spinner("#fff",18)); }
    else submitProd.appendChild(document.createTextNode("List Product →"));
    submitProd.addEventListener("click",()=>{
      if (!form.name||!form.price) { notify("Fill in name and price","error"); return; }
      setState({addProductLoading:true});
      setTimeout(()=>{
        const newProd = {
          id: Date.now(), name:form.name, price:Number(form.price),
          oldPrice:Number(form.price)*1.2|0, off:17, img:form.emoji,
          cat:form.cat, stock:Number(form.stock)||50, rating:0, reviews:0,
          seller:(state.user?.username||"MySeller")+".sol", flash:false,
          sellerId:state.wallet, sellerWallet:state.wallet
        };
        PRODUCTS.unshift(newProd);
        setState({addProductLoading:false, sellerProducts:[newProd,...state.sellerProducts], addProductForm:{name:"",price:"",oldPrice:"",cat:"Home",stock:"",emoji:"📦"}});
        notify("Product listed! ✓");
      },1500);
    });
    addBox.appendChild(submitProd);
    content.appendChild(addBox);

    myProducts.forEach(p=>{
      const row = el("div",{style:{background:"#F8F8F8",borderRadius:"12px",padding:"12px",marginBottom:"10px",display:"flex",alignItems:"center",gap:"12px"}});
      row.appendChild(el("div",{style:{fontSize:"32px",width:"48px",height:"48px",background:WHITE,borderRadius:"10px",display:"flex",alignItems:"center",justifyContent:"center",border:`1px solid ${BORDER_C}`,flexShrink:"0"}},p.img));
      const info = el("div",{style:{flex:"1"}});
      info.appendChild(el("div",{style:{fontWeight:"700",color:DARK,fontSize:"13px"}},p.name.slice(0,32)+"..."));
      info.appendChild(el("div",{style:{color:MUTED,fontSize:"11px",marginTop:"2px"}},`${p.stock} in stock`));
      row.appendChild(info);
      row.appendChild(el("div",{style:{fontWeight:"900",color:ORANGE,fontSize:"13px",fontFamily:"Syne,sans-serif"}},fmtN(p.price)));
      content.appendChild(row);
    });
  }

  if (tab==="analytics") {
    const analyticsBox = el("div",{style:{background:"#F8F8F8",borderRadius:"14px",padding:"20px"}});
    analyticsBox.appendChild(el("div",{style:{fontWeight:"700",color:DARK,marginBottom:"14px"}},"12-Week Revenue"));
    const chart = el("div",{style:{display:"flex",alignItems:"flex-end",gap:"5px",height:"100px"}});
    [40,65,50,80,70,90,75,110,95,130,115,140].forEach((h,i)=>{
      chart.appendChild(el("div",{style:{flex:"1",height:`${h*0.7}px`,background:i===11?ORANGE:`linear-gradient(${PRIMARY},${ACCENT})`,borderRadius:"3px 3px 0 0",opacity:String(0.65+i*0.03)}}));
    });
    analyticsBox.appendChild(chart);
    const labels = el("div",{style:{display:"flex",justifyContent:"space-between",marginTop:"6px"}});
    labels.appendChild(el("span",{style:{color:MUTED,fontSize:"10px"}},"Jan"));
    labels.appendChild(el("span",{style:{color:MUTED,fontSize:"10px"}},"Mar"));
    analyticsBox.appendChild(labels);
    content.appendChild(analyticsBox);
  }

  panel.appendChild(content);
  return panel;
}

// ═══════════════════════════════════════════════════════════════
// HOME PAGE
// ═══════════════════════════════════════════════════════════════
function HomePage() {
  const h = Math.floor(state.countdown/3600);
  const m = Math.floor((state.countdown%3600)/60);
  const s = state.countdown%60;

  const scroll = el("div",{style:{overflowY:"auto",paddingBottom:"72px"}});

  // Banner
  const bannerWrap = el("div",{style:{padding:"14px 0 10px"}});
  bannerWrap.appendChild(BannerCarousel());
  scroll.appendChild(bannerWrap);

  // Quick cats
  const qcRow = el("div",{style:{display:"flex",gap:"10px",overflowX:"auto",padding:"0 12px 14px",paddingBottom:"14px"}});
  QUICK_CATS.forEach(c=>{
    const item = el("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:"5px",flexShrink:"0",cursor:"pointer"}});
    item.appendChild(el("div",{style:{width:"58px",height:"58px",borderRadius:"14px",background:c.bg+"18",border:`2px solid ${c.bg}25`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"26px"}},c.icon));
    item.appendChild(el("div",{style:{fontSize:"10px",fontWeight:"700",color:DARK,textAlign:"center",maxWidth:"58px",lineHeight:"1.2"}},c.label));
    qcRow.appendChild(item);
  });
  scroll.appendChild(qcRow);

  // Flash sales
  const TimeBox = v => el("div",{style:{background:DARK,color:"white",borderRadius:"8px",padding:"4px 8px",fontWeight:"900",fontSize:"18px",minWidth:"36px",textAlign:"center",fontFamily:"Syne,sans-serif"}},String(v).padStart(2,"0"));
  const flashWrap = el("div",{style:{background:WHITE,borderRadius:"16px",margin:"0 12px 14px",overflow:"hidden",border:`1px solid ${BORDER_C}`}});
  const flashHdr = el("div",{style:{background:RED,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}});
  const flashLeft = el("div",{style:{display:"flex",alignItems:"center",gap:"10px"}});
  flashLeft.appendChild(el("span",{style:{fontSize:"20px"}},"⚡"));
  const flashTitle = el("div");
  flashTitle.appendChild(el("div",{style:{fontWeight:"900",fontSize:"16px",color:"white",fontFamily:"Syne,sans-serif"}},"Flash Sales"));
  flashTitle.appendChild(el("div",{style:{color:"rgba(255,255,255,0.8)",fontSize:"10px"}},"TIME LEFT:"));
  flashLeft.appendChild(flashTitle);
  const clockRow = el("div",{style:{display:"flex",alignItems:"center",gap:"4px"}});
  [h,m,s].forEach((v,i)=>{
    clockRow.appendChild(TimeBox(v));
    if (i<2) clockRow.appendChild(el("span",{style:{color:"white",fontWeight:"900"}},":"));
  });
  flashLeft.appendChild(clockRow);
  flashHdr.appendChild(flashLeft);
  flashWrap.appendChild(flashHdr);

  const flashGrid = el("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"1px",background:BORDER_C}});
  PRODUCTS.filter(p=>p.flash).forEach(p=>{
    const card = el("div",{style:{background:WHITE,padding:"10px",cursor:"pointer"},onClick:()=>openModal("product",p)});
    const imgB = el("div",{style:{position:"relative",background:"#FFF5F0",borderRadius:"10px",height:"90px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"48px",marginBottom:"8px"}});
    imgB.appendChild(document.createTextNode(p.img));
    imgB.appendChild(el("div",{style:{position:"absolute",top:"4px",right:"4px",background:RED,color:"white",borderRadius:"5px",padding:"1px 6px",fontSize:"10px",fontWeight:"800"}},`-${p.off}%`));
    card.appendChild(imgB);
    card.appendChild(el("div",{style:{fontWeight:"900",fontSize:"14px",color:ORANGE,fontFamily:"Syne,sans-serif"}},fmtN(p.price)));
    card.appendChild(el("div",{style:{color:MUTED,fontSize:"9px",marginTop:"2px"}},`${p.stock} left`));
    flashGrid.appendChild(card);
  });
  flashWrap.appendChild(flashGrid);
  scroll.appendChild(flashWrap);

  // Category filter
  const catRow = el("div",{style:{display:"flex",gap:"8px",overflowX:"auto",padding:"0 12px 12px"}});
  CATS.forEach(c=>{
    const b = el("button",{style:{whiteSpace:"nowrap",padding:"8px 16px",borderRadius:"20px",border:`1.5px solid ${state.cat===c?PRIMARY:BORDER_C}`,background:state.cat===c?PRIMARY:WHITE,color:state.cat===c?"white":DARK,fontWeight:"700",fontSize:"13px",cursor:"pointer",flexShrink:"0",transition:"all 0.18s"},onClick:()=>setState({cat:c})},c);
    catRow.appendChild(b);
  });
  scroll.appendChild(catRow);

  // Products
  const filtered = PRODUCTS.filter(p=>{
    const mc = state.cat==="All"||p.cat===state.cat;
    const ms = p.name.toLowerCase().includes(state.search.toLowerCase());
    return mc&&ms;
  });

  const prodHdr = el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0 14px 10px"}});
  const prodTitle = el("div",{style:{fontWeight:"900",fontSize:"16px",color:DARK,fontFamily:"Syne,sans-serif"}});
  prodTitle.innerHTML=`${state.cat==="All"?"All Products":state.cat} <span style="color:${MUTED};font-weight:600;font-size:13px">(${filtered.length})</span>`;
  prodHdr.appendChild(prodTitle);
  scroll.appendChild(prodHdr);

  const prodGrid = el("div",{style:{padding:"0 12px 16px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}});
  filtered.forEach(p=>prodGrid.appendChild(PCard(p)));
  if (!filtered.length) {
    const empty = el("div",{style:{textAlign:"center",padding:"60px 20px",color:MUTED,gridColumn:"1/-1"}});
    empty.appendChild(el("div",{style:{fontSize:"48px",marginBottom:"12px"}},"🔍"));
    empty.appendChild(el("div",{style:{fontWeight:"800",color:DARK,fontSize:"17px"}},"No products found"));
    prodGrid.appendChild(empty);
  }
  scroll.appendChild(prodGrid);

  // Why SolMarket
  const whyBox = el("div",{style:{background:WHITE,borderRadius:"16px",margin:"0 12px 16px",padding:"18px",border:`1px solid ${BORDER_C}`}});
  whyBox.appendChild(el("div",{style:{fontWeight:"900",fontSize:"15px",color:DARK,marginBottom:"14px",fontFamily:"Syne,sans-serif"}},"Why SolMarket?"));
  [["🔗","Wallet Sign-in Only","Your Solana wallet is your identity — no passwords."],
   ["🛡️","Verified Merchants","Every seller is on-chain approved by our admin team."],
   ["⚡","Real-time Tracking","Track your package from payment to doorstep instantly."],
   ["📦","Escrow Protection","Funds locked until you confirm delivery."]].forEach(([icon,title,desc])=>{
    const row = el("div",{style:{display:"flex",gap:"12px",marginBottom:"12px",alignItems:"flex-start"}});
    row.appendChild(el("div",{style:{width:"38px",height:"38px",borderRadius:"10px",background:"#F5F0FF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",flexShrink:"0"}},icon));
    const txt = el("div");
    txt.appendChild(el("div",{style:{fontWeight:"700",fontSize:"13px",color:DARK}},title));
    txt.appendChild(el("div",{style:{color:MUTED,fontSize:"12px",marginTop:"2px",lineHeight:"1.4"}},desc));
    row.appendChild(txt);
    whyBox.appendChild(row);
  });
  scroll.appendChild(whyBox);

  return scroll;
}

// ═══════════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════════
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  // Toast
  if (state._toast) app.appendChild(Toast(state._toast));

  // Full-screen panels (no top/bottom bar)
  if (state.screen === "admin") { app.appendChild(AdminScreen()); return; }
  if (state.screen === "merchantDash") { app.appendChild(MerchantDashScreen()); return; }

  // ── TOP BAR ──
  const topBar = el("div",{style:{background:PRIMARY,padding:"12px 14px 10px",position:"sticky",top:"0",zIndex:"200",flexShrink:"0"}});

  const topRow = el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}});

  const logoWrap = el("div",{style:{display:"flex",alignItems:"center",gap:"8px",cursor:"pointer"},onClick:()=>{
    state.tapCount=(state.tapCount||0)+1;
    clearTimeout(state.tapTimer);
    state.tapTimer=setTimeout(()=>{state.tapCount=0;},800);
    if(state.tapCount>=5){state.tapCount=0;openModal("adminLogin");}
  }});
  logoWrap.appendChild(el("div",{style:{width:"32px",height:"32px",borderRadius:"9px",background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"900",color:"white",fontSize:"18px",fontFamily:"Syne,sans-serif"}},"S"));
  logoWrap.appendChild(el("span",{style:{fontWeight:"900",fontSize:"20px",color:"white",fontFamily:"Syne,sans-serif"}},"SolMarket"));
  topRow.appendChild(logoWrap);

  const rightBtns = el("div",{style:{display:"flex",alignItems:"center",gap:"8px"}});

  if (state.wallet) {
    // ── Admin wallet: show Admin Panel button ──
    if (state.wallet === SUPER_ADMIN_WALLET || state.user?.role === "admin") {
      rightBtns.appendChild(el("button",{style:{background:"#FFD700",border:"none",color:"#1A1A1A",borderRadius:"10px",padding:"6px 12px",fontSize:"12px",cursor:"pointer",fontWeight:"800"},onClick:()=>openScreen("admin")},"👑 Admin"));
    } else {
      // Show store button if seller
      if (state.merchantStatus==="approved") {
        rightBtns.appendChild(el("button",{style:{background:"rgba(255,255,255,0.2)",border:"none",color:"white",borderRadius:"10px",padding:"6px 10px",fontSize:"12px",cursor:"pointer",fontWeight:"700"},onClick:()=>openScreen("merchantDash")},"My Store"));
      }
      // Sell button
      if (!state.merchantStatus) {
        rightBtns.appendChild(el("button",{style:{background:"rgba(255,255,255,0.2)",border:"none",color:"white",borderRadius:"10px",padding:"6px 10px",fontSize:"11px",cursor:"pointer",fontWeight:"700"},onClick:()=>openModal("merchant")},"+ Sell"));
      }
      if (state.merchantStatus==="pending") {
        rightBtns.appendChild(el("div",{style:{background:"rgba(255,165,0,0.3)",borderRadius:"10px",padding:"6px 10px",fontSize:"11px",color:"white",fontWeight:"700"}},"⏳ Pending"));
      }
    }

    // Wallet badge
    const walletBadge = el("div",{style:{display:"flex",alignItems:"center",gap:"5px",background:"rgba(255,255,255,0.15)",borderRadius:"10px",padding:"6px 10px",cursor:"pointer"},onClick:()=>openModal("profile")});
    walletBadge.appendChild(el("div",{style:{width:"7px",height:"7px",borderRadius:"50%",background:ACCENT}}));
    walletBadge.appendChild(el("span",{style:{fontFamily:"monospace",fontSize:"11px",color:"white"}},state.user?.username||shortAddr(state.wallet)));
    rightBtns.appendChild(walletBadge);
  } else {
    rightBtns.appendChild(el("button",{style:{background:WHITE,border:"none",color:PRIMARY,borderRadius:"10px",padding:"8px 14px",fontWeight:"800",fontSize:"13px",cursor:"pointer"},onClick:()=>openModal("wallet")},"Connect"));
  }
  topRow.appendChild(rightBtns);
  topBar.appendChild(topRow);

  // Search bar
  const searchWrap = el("div",{style:{position:"relative"}});
  searchWrap.appendChild(el("span",{style:{position:"absolute",left:"12px",top:"50%",transform:"translateY(-50%)",fontSize:"16px"}},"🔍"));
  const searchInp = el("input",{style:{width:"100%",background:WHITE,border:"none",borderRadius:"10px",padding:"11px 14px 11px 40px",fontSize:"14px",color:DARK,outline:"none"},placeholder:"Search on SolMarket"});
  searchInp.value=state.search;
  // FIX: don't call setState on every keystroke – only update local then render
  searchInp.addEventListener("input",e=>{state.search=e.target.value;render();});
  searchWrap.appendChild(searchInp);
  topBar.appendChild(searchWrap);
  app.appendChild(topBar);

  // Promo bar
  app.appendChild(el("div",{style:{background:ORANGE,padding:"8px 16px",textAlign:"center",fontWeight:"700",fontSize:"13px",color:"white",letterSpacing:"0.3px"}},"📞 "+(state._promoText||"ORDER: 07006000000 | 02018883300")));

  // SOL rate ticker
  const ticker = el("div",{style:{background:"#1A1A1A",padding:"5px 16px",display:"flex",alignItems:"center",justifyContent:"center",gap:"12px"}});
  ticker.appendChild(el("span",{style:{fontSize:"12px",color:"#14F195",fontWeight:"700"}},"◎ SOL"));
  const rateSpan = el("span",{style:{fontSize:"12px",color:"white",fontWeight:"700"}},SOL_PRICE_NGN ? fmtN(Math.round(SOL_PRICE_NGN)) : "Loading…");
  ticker.appendChild(rateSpan);
  if (SOL_PRICE_USD) ticker.appendChild(el("span",{style:{fontSize:"11px",color:"#888"}},"$"+SOL_PRICE_USD.toLocaleString()));
  ticker.appendChild(el("span",{style:{fontSize:"10px",color:"#555",marginLeft:"4px"}},"Live price"));
  app.appendChild(ticker);

  // ── HOME PAGE ──
  app.appendChild(HomePage());

  // ── BOTTOM NAV ──
  const cartCount = state.cart.length;
  const nav = el("div",{class:"bottom-nav"});
  const navItems = [
    {icon:"🏠",label:"Home",tab:"home",action:null},
    {icon:"📦",label:"Track",tab:"track",action:()=>openModal("track")},
    {icon:"🛒",label:"Cart",tab:"cart",badge:cartCount,action:()=>openModal("cart")},
    {icon:"❤️",label:"Wishlist",tab:"wish",action:null},
    {icon:"👤",label:"Account",tab:"account",action:()=>openModal("profile")},
  ];
  navItems.forEach(item=>{
    const b = el("button",{class:"nav-btn",onClick:item.action||null});
    const iconWrap = el("div",{style:{position:"relative"}});
    iconWrap.appendChild(el("span",{style:{fontSize:"22px"}},item.icon));
    if (item.badge && item.badge>0) {
      iconWrap.appendChild(el("div",{style:{position:"absolute",top:"-4px",right:"-6px",width:"16px",height:"16px",borderRadius:"50%",background:ORANGE,color:"white",fontSize:"9px",fontWeight:"900",display:"flex",alignItems:"center",justifyContent:"center"}},String(item.badge)));
    }
    b.appendChild(iconWrap);
    b.appendChild(el("span",{style:{fontSize:"10px",fontWeight:"700",color:item.tab===state.activeTab?PRIMARY:MUTED}},item.label));
    if (item.tab===state.activeTab) b.appendChild(el("div",{style:{width:"20px",height:"3px",borderRadius:"2px",background:PRIMARY}}));
    nav.appendChild(b);
  });
  app.appendChild(nav);

  // ── MODALS now mount directly on body via openModal() ──
  // Refresh modal if open (e.g. state changed inside modal)
  if (state.modal) _mountModal();
}

// ═══════════════════════════════════════════════════════════════
// TIMERS
// ═══════════════════════════════════════════════════════════════
setInterval(()=>{
  state.countdown = Math.max(0, state.countdown-1);
  // Only update countdown display without full re-render
  if (!state.modal && !state.screen) render();
}, 1000);

setInterval(()=>{
  state.bannerIdx=(state.bannerIdx+1)%BANNERS.length;
  if (!state.modal && !state.screen) render();
}, 4000);
