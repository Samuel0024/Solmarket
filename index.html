// ── Helpers ────────────────────────────────────────────────────────────────
function setState(updates) {
  Object.assign(state, updates);
  render();
}

function notify(msg, type="success") {
  setState({toast:{msg,type}});
  setTimeout(() => setState({toast:null}), 2800);
}

function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "className") e.className = v;
    else e.setAttribute(k, v);
  }
  for (const child of children) {
    if (child == null) continue;
    if (typeof child === "string" || typeof child === "number") e.appendChild(document.createTextNode(child));
    else if (child instanceof Node) e.appendChild(child);
  }
  return e;
}

function css(obj) { return obj; }

// ── Shared styles ──────────────────────────────────────────────────────────
const ML = {color:MUTED,fontSize:"13px",display:"block",marginBottom:"5px",fontWeight:"700"};
const MS = {width:"100%",background:"#F8F8F8",border:`1.5px solid ${BORDER_C}`,borderRadius:"10px",padding:"12px 14px",fontSize:"14px",color:DARK,outline:"none",boxSizing:"border-box"};
const SOLID_BTN = {padding:"13px 24px",borderRadius:"12px",border:"none",background:SOL_GRAD,color:WHITE,fontWeight:"800",fontSize:"14px",cursor:"pointer"};
const OUT_BTN = {padding:"10px 18px",borderRadius:"10px",border:`1.5px solid ${BORDER_C}`,background:WHITE,color:DARK,fontWeight:"700",fontSize:"13px",cursor:"pointer"};

// ── Spinner ────────────────────────────────────────────────────────────────
function Spinner(color="#fff", size=24) {
  return el("div", {style:{width:size+"px",height:size+"px",border:`3px solid ${color}40`,borderTop:`3px solid ${color}`,borderRadius:"50%",animation:"spin 0.7s linear infinite",flexShrink:"0",display:"inline-block"}});
}

// ── Toast ──────────────────────────────────────────────────────────────────
function Toast({msg, type}) {
  return el("div", {style:{position:"fixed",top:"16px",left:"50%",transform:"translateX(-50%)",zIndex:"99999",background:type==="success"?"#0EA66D":RED,color:WHITE,borderRadius:"20px",padding:"10px 22px",fontWeight:"700",fontSize:"14px",boxShadow:"0 8px 32px rgba(0,0,0,0.18)",whiteSpace:"nowrap",animation:"slideDown 0.3s ease"}},
    (type==="success" ? "✓ " : "! ") + msg
  );
}

// ── TimeBox ────────────────────────────────────────────────────────────────
function TimeBox(v) {
  return el("div", {style:{background:DARK,color:WHITE,borderRadius:"8px",padding:"4px 8px",fontWeight:"900",fontSize:"18px",minWidth:"36px",textAlign:"center"}}, String(v).padStart(2,"0"));
}

// ── Banner Carousel ────────────────────────────────────────────────────────
function BannerCarousel() {
  const b = BANNERS[state.bannerIdx];
  const wrap = el("div", {style:{position:"relative",margin:"0 12px",borderRadius:"16px",overflow:"hidden",height:"160px",background:b.bg,transition:"background 0.5s",animation:"bannerFade 0.5s ease"}});

  // tag
  wrap.appendChild(el("div", {style:{position:"absolute",top:"12px",left:"14px",background:b.tagBg,color:WHITE,borderRadius:"8px",padding:"3px 12px",fontSize:"11px",fontWeight:"800",letterSpacing:"0.5px"}}, b.tag));

  // text
  const textDiv = el("div", {style:{position:"absolute",bottom:"14px",left:"14px",right:"38%"}});
  textDiv.appendChild(el("div", {style:{color:WHITE,fontWeight:"900",fontSize:"17px",lineHeight:"1.2",textShadow:"0 2px 8px rgba(0,0,0,0.3)"}}, b.title));
  const subDiv = el("div", {style:{marginTop:"8px",display:"inline-block",background:"rgba(255,255,255,0.25)",color:WHITE,borderRadius:"8px",padding:"4px 12px",fontSize:"13px",fontWeight:"800",backdropFilter:"blur(4px)"}}, b.sub);
  textDiv.appendChild(subDiv);
  wrap.appendChild(textDiv);

  // emoji
  wrap.appendChild(el("div", {style:{position:"absolute",right:"16px",top:"50%",transform:"translateY(-50%)",fontSize:"72px"}}, b.emoji));

  // dots
  const dots = el("div", {style:{position:"absolute",bottom:"8px",left:"50%",transform:"translateX(-50%)",display:"flex",gap:"5px"}});
  BANNERS.forEach((_,i) => {
    dots.appendChild(el("div", {style:{width:i===state.bannerIdx?"20px":"6px",height:"6px",borderRadius:"3px",background:`rgba(255,255,255,${i===state.bannerIdx?0.95:0.4})`,transition:"all 0.3s"}}));
  });
  wrap.appendChild(dots);
  return wrap;
}

// ── Product Card ────────────────────────────────────────────────────────────
function PCard(product) {
  const card = el("div", {style:{background:WHITE,borderRadius:"12px",overflow:"hidden",border:`1px solid ${BORDER_C}`,cursor:"pointer"}});
  card.addEventListener("click", () => setState({selectedProduct:product,productQty:1,productOrdered:false,productLoading:false}));

  const imgWrap = el("div", {style:{background:"linear-gradient(135deg,#FAF5FF,#F0FDF8)",height:"130px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"62px",position:"relative"}});
  imgWrap.appendChild(document.createTextNode(product.img));
  if (product.off > 0) imgWrap.appendChild(el("div",{style:{position:"absolute",top:"8px",left:"8px",background:RED,color:WHITE,borderRadius:"6px",padding:"2px 7px",fontSize:"11px",fontWeight:"800"}}, `-${product.off}%`));
  if (product.flash) imgWrap.appendChild(el("div",{style:{position:"absolute",top:"8px",right:"8px",background:ORANGE,color:WHITE,borderRadius:"6px",padding:"2px 7px",fontSize:"9px",fontWeight:"800"}}, "FLASH"));
  card.appendChild(imgWrap);

  const info = el("div", {style:{padding:"10px 10px 12px"}});
  const nameDiv = el("div", {style:{fontWeight:"700",fontSize:"13px",color:DARK,lineHeight:"1.3",marginBottom:"6px",overflow:"hidden",display:"-webkit-box",WebkitLineClamp:"2",WebkitBoxOrient:"vertical"}}, product.name);
  info.appendChild(nameDiv);
  info.appendChild(el("div",{style:{fontWeight:"900",fontSize:"16px",color:ORANGE}}, fmtN(product.price)));
  if (product.oldPrice) info.appendChild(el("div",{style:{textDecoration:"line-through",color:MUTED,fontSize:"11px",marginTop:"1px"}}, fmtN(product.oldPrice)));

  const starRow = el("div",{style:{color:"#FFB800",fontSize:"11px",marginTop:"4px"}});
  starRow.innerHTML = stars(product.rating) + ` <span style="color:${MUTED}">(${product.reviews})</span>`;
  info.appendChild(starRow);

  const stockWrap = el("div",{style:{marginTop:"6px"}});
  const bar = el("div",{style:{height:"4px",background:BORDER_C,borderRadius:"4px"}});
  bar.appendChild(el("div",{style:{height:"4px",background:product.stock<50?RED:ORANGE,borderRadius:"4px",width:`${Math.min(100,product.stock/3)}%`}}));
  stockWrap.appendChild(bar);
  stockWrap.appendChild(el("div",{style:{color:MUTED,fontSize:"10px",marginTop:"3px"}}, `${product.stock} items left`));
  info.appendChild(stockWrap);
  card.appendChild(info);
  return card;
}

// ── Overlay + BottomSheet ──────────────────────────────────────────────────
function createOverlay(onClose) {
  const ov = el("div", {style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.55)",zIndex:"9000",display:"flex",alignItems:"flex-end",backdropFilter:"blur(4px)"}});
  ov.addEventListener("click", e => { if (e.target === ov) onClose(); });
  return ov;
}

function createBottomSheet({onClose, title, sub, tall}) {
  const sheet = el("div", {style:{width:"100%",background:WHITE,borderRadius:"24px 24px 0 0",padding:"20px 20px 36px",maxHeight:tall?"92vh":"85vh",overflowY:"auto",animation:"slideUp 0.3s ease"}});
  sheet.appendChild(el("div",{style:{width:"40px",height:"4px",background:BORDER_C,borderRadius:"2px",margin:"0 auto 18px"}}));
  if (title) {
    const hdr = el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"18px"}});
    const left = el("div");
    left.appendChild(el("div",{style:{fontWeight:"900",fontSize:"20px",color:DARK}}, title));
    if (sub) left.appendChild(el("div",{style:{color:MUTED,fontSize:"13px",marginTop:"2px"}}, sub));
    hdr.appendChild(left);
    const closeBtn = el("button",{style:{background:"#F0F0F0",border:"none",borderRadius:"50%",width:"34px",height:"34px",fontSize:"16px",cursor:"pointer",color:MUTED}}, "×");
    closeBtn.addEventListener("click", onClose);
    hdr.appendChild(closeBtn);
    sheet.appendChild(hdr);
  }
  return sheet;
}

// ── Field ──────────────────────────────────────────────────────────────────
function MField({label, value, onChange, placeholder, type="text", multiline}) {
  const wrap = el("div");
  const lbl = el("label",{style:ML}, label);
  wrap.appendChild(lbl);
  let input;
  if (multiline) {
    input = el("textarea",{style:{...MS,resize:"vertical"},placeholder,rows:"3"});
    input.value = value;
  } else {
    input = el("input",{type,placeholder,style:MS});
    input.value = value;
  }
  input.addEventListener("input", e => onChange(e.target.value));
  wrap.appendChild(input);
  return wrap;
}

// ── Wallet Modal ────────────────────────────────────────────────────────────
function WalletModal() {
  const wallets=[{name:"Phantom",emoji:"👻"},{name:"Solflare",emoji:"🔥"},{name:"Backpack",emoji:"🎒"},{name:"Glow",emoji:"✨"},{name:"Ledger",emoji:"🔒"},{name:"OKX",emoji:"⬛"}];
  const ov = createOverlay(() => setState({showWallet:false}));
  const sheet = createBottomSheet({onClose:() => setState({showWallet:false}), title:"Connect Wallet", sub:"Choose your Solana wallet"});
  const grid = el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginTop:"8px"}});
  wallets.forEach(w => {
    const btn = el("button",{style:{background:"#F8F8F8",border:`2px solid ${BORDER_C}`,borderRadius:"14px",padding:"16px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:"10px",transition:"border-color 0.2s",width:"100%",boxSizing:"border-box"}});
    btn.appendChild(el("span",{style:{fontSize:"26px"}},w.emoji));
    btn.appendChild(el("span",{style:{fontWeight:"700",fontSize:"14px",color:DARK}},w.name));
    btn.addEventListener("mouseenter", () => btn.style.borderColor=PRIMARY);
    btn.addEventListener("mouseleave", () => btn.style.borderColor=BORDER_C);
    btn.addEventListener("click", () => {
      const addr = "7xKp" + Math.random().toString(36).slice(2,6).toUpperCase() + "...Mn3Z";
      setState({wallet:addr,walletName:w.name,showWallet:false});
      notify(`${w.name} connected!`);
    });
    grid.appendChild(btn);
  });
  sheet.appendChild(grid);
  sheet.appendChild(el("p",{style:{color:MUTED,fontSize:"11px",textAlign:"center",marginTop:"16px"}}, "By connecting you agree to SolMarket's Terms of Service"));
  ov.appendChild(sheet);
  return ov;
}

// ── Merchant Modal ──────────────────────────────────────────────────────────
function MerchantModal() {
  const form = state.merchantForm;
  const step = state.merchantStep;
  const loading = state.merchantLoading;

  const ov = createOverlay(() => setState({showMerchant:false,merchantStep:1}));
  const sheet = createBottomSheet({onClose:() => setState({showMerchant:false,merchantStep:1}), title:"Become a Merchant", sub:`Step ${step} of 3`});

  // progress bar
  const prog = el("div",{style:{display:"flex",gap:"4px",marginBottom:"20px"}});
  [1,2,3].forEach(s => prog.appendChild(el("div",{style:{flex:"1",height:"4px",borderRadius:"4px",background:s<=step?PRIMARY:BORDER_C,transition:"background 0.3s"}})));
  sheet.appendChild(prog);

  const content = el("div",{style:{display:"flex",flexDirection:"column",gap:"14px"}});

  if (step === 1) {
    content.appendChild(MField({label:"Store Name *",value:form.storeName,onChange:v=>setState({merchantForm:{...state.merchantForm,storeName:v}}),placeholder:"e.g. MyCryptoShop"}));
    const catWrap = el("div");
    catWrap.appendChild(el("label",{style:ML},"Category *"));
    const sel = el("select",{style:MS});
    sel.appendChild(el("option",{value:""},"Pick a category"));
    CATS.slice(1).forEach(c => { const o=el("option"); o.value=c; o.textContent=c; sel.appendChild(o); });
    sel.value = form.category;
    sel.addEventListener("change", e => setState({merchantForm:{...state.merchantForm,category:e.target.value}}));
    catWrap.appendChild(sel);
    content.appendChild(catWrap);
    content.appendChild(MField({label:"Store Description *",value:form.desc,onChange:v=>setState({merchantForm:{...state.merchantForm,desc:v}}),placeholder:"What will you sell?",multiline:true}));
  }

  if (step === 2) {
    const walletBox = el("div",{style:{background:"#F0FDF8",border:"1.5px solid #14F19540",borderRadius:"12px",padding:"14px"}});
    walletBox.appendChild(el("div",{style:{color:MUTED,fontSize:"11px",marginBottom:"4px"}},"Connected Wallet"));
    walletBox.appendChild(el("div",{style:{fontFamily:"monospace",color:"#0EA66D",fontSize:"13px",fontWeight:"700"}},state.wallet||""));
    content.appendChild(walletBox);
    content.appendChild(MField({label:"Business Email *",value:form.email,onChange:v=>setState({merchantForm:{...state.merchantForm,email:v}}),placeholder:"store@email.com",type:"email"}));
    content.appendChild(MField({label:"Twitter / X Handle",value:form.twitter,onChange:v=>setState({merchantForm:{...state.merchantForm,twitter:v}}),placeholder:"@handle"}));
    const verifyBox = el("div",{style:{background:"#FFF8F0",border:"1.5px solid #FF6B0040",borderRadius:"12px",padding:"14px"}});
    verifyBox.appendChild(el("div",{style:{fontWeight:"700",color:ORANGE,fontSize:"13px",marginBottom:"4px"}},"ID Verification"));
    verifyBox.appendChild(el("div",{style:{color:MUTED,fontSize:"12px"}},"After submission, our team will request business documents via encrypted message."));
    content.appendChild(verifyBox);
  }

  if (step === 3) {
    const summary = el("div",{style:{background:"#F8F8F8",borderRadius:"14px",padding:"18px"}});
    summary.appendChild(el("div",{style:{fontWeight:"800",color:DARK,marginBottom:"12px",fontSize:"15px"}},"Application Summary"));
    [["Store",form.storeName||"—"],["Category",form.category||"—"],["Email",form.email||"—"],["Wallet",(state.wallet||"").slice(0,12)+"..."]].forEach(([k,v]) => {
      const row = el("div",{style:{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${BORDER_C}`}});
      row.appendChild(el("span",{style:{color:MUTED,fontSize:"13px"}},k));
      row.appendChild(el("span",{style:{fontWeight:"700",color:DARK,fontSize:"13px"}},v));
      summary.appendChild(row);
    });
    content.appendChild(summary);

    const bondBox = el("div",{style:{background:"#F0F8FF",border:"1.5px solid #9945FF40",borderRadius:"12px",padding:"14px"}});
    bondBox.innerHTML = `<div style="color:${MUTED};font-size:12px;line-height:1.7">A refundable bond of <b>0.1 SOL</b> will be locked until your application is reviewed. Admin approval is done via multisig — fully on-chain.</div>`;
    content.appendChild(bondBox);

    const agreeLabel = el("label",{style:{display:"flex",alignItems:"center",gap:"10px",cursor:"pointer"}});
    const chk = el("input",{type:"checkbox",style:{width:"18px",height:"18px",accentColor:PRIMARY}});

    chk.addEventListener("change", e => setState({merchantForm:{...state.merchantForm,agree:e.target.checked}}));
    agreeLabel.appendChild(chk);

    content.appendChild(agreeLabel);

  sheet.appendChild(content);

  if (loading) {
    const spinWrap = el("div",{style:{textAlign:"center",padding:"24px 0"}});
    spinWrap.appendChild(Spinner(PRIMARY, 32));
    spinWrap.appendChild(el("div",{style:{color:MUTED,fontSize:"14px",marginTop:"12px"}},"Submitting to Solana..."));
    sheet.appendChild(spinWrap);
  } else {
    const btnRow = el("div",{style:{display:"flex",gap:"10px",marginTop:"20px"}});
    if (step > 1) {
      const backBtn = el("button",{style:{...OUT_BTN,flex:"1"}}, "Back");
      backBtn.addEventListener("click", () => setState({merchantStep:step-1}));
      btnRow.appendChild(backBtn);
    }
    const nextBtn = el("button",{style:{...SOLID_BTN,flex:"2",opacity:step===3&&!form.agree?"0.5":"1"}}, step===3?"Sign & Submit":"Continue");
    nextBtn.disabled = step===3 && !form.agree;
    nextBtn.addEventListener("click", () => {
      if (step < 3) setState({merchantStep:step+1});
      else {
        setState({merchantLoading:true});
        setTimeout(() => {
          setState({merchantLoading:false,merchantStatus:"pending",showMerchant:false,merchantStep:1});
          notify("Application submitted! Pending review");
        }, 2000);
      }
    });
    btnRow.appendChild(nextBtn);
    sheet.appendChild(btnRow);
  }

  ov.appendChild(sheet);
  return ov;
}

  inp.value = state.adminCode;

  ov.appendChild(sheet);
  return ov;

  app.appendChild(el("div",{style:{background:ORANGE,padding:"8px 16px",textAlign:"center",fontWeight:"800",fontSize:"13px",color:WHITE,letterSpacing:"0.3px"}},"CALL TO ORDER: 07006000000, 02018883300"));

  // ── MAIN SCROLL ──
  const scroll = el("div",{style:{overflowY:"auto",paddingBottom:"72px"}});

  // Banner
  const bannerWrap = el("div",{style:{padding:"14px 0 10px"}});
  bannerWrap.appendChild(BannerCarousel());
  scroll.appendChild(bannerWrap);

  // Quick categories
  const qcWrap = el("div",{style:{padding:"0 12px 14px"}});
  const qcRow = el("div",{style:{display:"flex",gap:"10px",overflowX:"auto",paddingBottom:"4px"}});
  QUICK_CATS.forEach(c => {
    const item = el("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:"5px",flexShrink:"0",cursor:"pointer"}});
    item.appendChild(el("div",{style:{width:"58px",height:"58px",borderRadius:"14px",background:c.bg+"18",border:`2px solid ${c.bg}25`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"26px"}},c.icon));
    item.appendChild(el("div",{style:{fontSize:"10px",fontWeight:"700",color:DARK,textAlign:"center",maxWidth:"58px",lineHeight:"1.2"}},c.label));
    qcRow.appendChild(item);
  });
  qcWrap.appendChild(qcRow);
  scroll.appendChild(qcWrap);

  // Flash sales countdown
  const h = Math.floor(state.countdown/3600);
  const m = Math.floor((state.countdown%3600)/60);
  const s = state.countdown%60;

  const flashWrap = el("div",{style:{background:WHITE,borderRadius:"16px",margin:"0 12px 14px",overflow:"hidden",border:`1px solid ${BORDER_C}`}});
  const flashHeader = el("div",{style:{background:RED,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}});
  const flashLeft = el("div",{style:{display:"flex",alignItems:"center",gap:"10px"}});
  flashLeft.appendChild(el("span",{style:{fontSize:"20px"}},"⚡"));
  const flashTitle = el("div");
  flashTitle.appendChild(el("div",{style:{fontWeight:"900",fontSize:"16px",color:WHITE}},"Flash Sales"));
  flashTitle.appendChild(el("div",{style:{color:"rgba(255,255,255,0.8)",fontSize:"10px"}},"TIME LEFT:"));
  flashLeft.appendChild(flashTitle);
  const clockRow = el("div",{style:{display:"flex",alignItems:"center",gap:"4px"}});
  clockRow.appendChild(TimeBox(h));
  clockRow.appendChild(el("span",{style:{color:WHITE,fontWeight:"900"}},":"));
  clockRow.appendChild(TimeBox(m));
  clockRow.appendChild(el("span",{style:{color:WHITE,fontWeight:"900"}},":"));
  clockRow.appendChild(TimeBox(s));
  flashLeft.appendChild(clockRow);
  flashHeader.appendChild(flashLeft);
  const seeAllBtn = el("button",{style:{background:"rgba(255,255,255,0.2)",border:"none",color:WHITE,borderRadius:"8px",padding:"6px 12px",fontSize:"12px",cursor:"pointer",fontWeight:"700"}},"See All");
  flashHeader.appendChild(seeAllBtn);
  flashWrap.appendChild(flashHeader);

  const flashGrid = el("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"1px",background:BORDER_C}});
  PRODUCTS.filter(p=>p.flash).forEach(p => {
    const card = el("div",{style:{background:WHITE,padding:"10px",cursor:"pointer"}});
    card.addEventListener("click",()=>setState({selectedProduct:p,productQty:1,productOrdered:false,productLoading:false}));
    const imgBox = el("div",{style:{position:"relative",background:"#FFF5F0",borderRadius:"10px",height:"90px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"48px",marginBottom:"8px"}});
    imgBox.appendChild(document.createTextNode(p.img));
    imgBox.appendChild(el("div",{style:{position:"absolute",top:"4px",right:"4px",background:RED,color:WHITE,borderRadius:"5px",padding:"1px 6px",fontSize:"10px",fontWeight:"800"}},`-${p.off}%`));
    card.appendChild(imgBox);
    card.appendChild(el("div",{style:{fontWeight:"900",fontSize:"14px",color:ORANGE}},fmtN(p.price)));
    const stockBox = el("div",{style:{marginTop:"4px"}});
    const sBar = el("div",{style:{height:"3px",background:BORDER_C,borderRadius:"3px"}});
    sBar.appendChild(el("div",{style:{height:"3px",background:ORANGE,borderRadius:"3px",width:`${Math.min(100,p.stock/3)}%`}}));
    stockBox.appendChild(sBar);
    stockBox.appendChild(el("div",{style:{color:MUTED,fontSize:"9px",marginTop:"2px"}},`${p.stock} items left`));
    card.appendChild(stockBox);
    flashGrid.appendChild(card);
  });
  flashWrap.appendChild(flashGrid);
  scroll.appendChild(flashWrap);

  // Category filter
  const catRow = el("div",{style:{padding:"0 12px 12px",display:"flex",gap:"8px",overflowX:"auto"}});
  CATS.forEach(c => {
    const btn = el("button",{style:{whiteSpace:"nowrap",padding:"8px 16px",borderRadius:"20px",border:`1.5px solid ${state.cat===c?PRIMARY:BORDER_C}`,background:state.cat===c?PRIMARY:WHITE,color:state.cat===c?WHITE:DARK,fontWeight:"700",fontSize:"13px",cursor:"pointer",flexShrink:"0",transition:"all 0.18s"}},c);
    btn.addEventListener("click",()=>setState({cat:c}));
    catRow.appendChild(btn);
  });
  scroll.appendChild(catRow);

  // Products header
  const filtered = PRODUCTS.filter(p => {
    const mc = state.cat==="All" || p.cat===state.cat;
    const ms2 = p.name.toLowerCase().includes(state.search.toLowerCase());
    return mc && ms2;
  });

  const prodHdr = el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0 14px 10px"}});
  const prodTitle = el("div",{style:{fontWeight:"900",fontSize:"16px",color:DARK}});
  prodTitle.innerHTML = `${state.cat==="All"?"All Products":state.cat} <span style="color:${MUTED};font-weight:600;font-size:13px">(${filtered.length})</span>`;
  prodHdr.appendChild(prodTitle);
  const sortRow = el("div",{style:{display:"flex",gap:"8px"}});
  sortRow.appendChild(el("button",{style:{...OUT_BTN,padding:"6px 12px",fontSize:"12px"}},"Filter"));
  sortRow.appendChild(el("button",{style:{...OUT_BTN,padding:"6px 12px",fontSize:"12px"}},"Sort"));
  prodHdr.appendChild(sortRow);
  scroll.appendChild(prodHdr);

  // Products grid
  const prodGrid = el("div",{style:{padding:"0 12px 16px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}});
  filtered.forEach(p => prodGrid.appendChild(PCard(p)));
  scroll.appendChild(prodGrid);

  if (filtered.length===0) {
    const empty = el("div",{style:{textAlign:"center",padding:"60px 20px",color:MUTED}});
    empty.appendChild(el("div",{style:{fontSize:"48px",marginBottom:"12px"}},"🔍"));
    empty.appendChild(el("div",{style:{fontWeight:"800",color:DARK,fontSize:"17px",marginBottom:"6px"}},"No products found"));
    empty.appendChild(el("div",{style:{fontSize:"14px"}},"Try a different search or category"));
    scroll.appendChild(empty);
  }

  // Why SolMarket
  const whyBox = el("div",{style:{background:WHITE,borderRadius:"16px",margin:"0 12px 16px",padding:"18px",border:`1px solid ${BORDER_C}`}});
  whyBox.appendChild(el("div",{style:{fontWeight:"900",fontSize:"15px",color:DARK,marginBottom:"14px"}},"Why SolMarket?"));
  [["🔗","Wallet Sign-in Only","No username, no password — your Solana wallet is your identity."],
   ["🛡️","Verified Merchants","Every seller is on-chain approved. No fake stores."],
   ["⚡","400ms Finality","Fastest on-chain marketplace. Near-zero fees."],
   ["📦","Escrow Protection","Funds locked until you confirm delivery."]].forEach(([icon,title,desc]) => {
    const row = el("div",{style:{display:"flex",gap:"12px",marginBottom:"12px",alignItems:"flex-start"}});
    row.appendChild(el("div",{style:{width:"38px",height:"38px",borderRadius:"10px",background:"#F5F0FF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",flexShrink:"0"}},icon));
    const txt = el("div");
    txt.appendChild(el("div",{style:{fontWeight:"800",fontSize:"13px",color:DARK}},title));
    txt.appendChild(el("div",{style:{color:MUTED,fontSize:"12px",marginTop:"2px",lineHeight:"1.4"}},desc));
    row.appendChild(txt);
    whyBox.appendChild(row);
  });
  scroll.appendChild(whyBox);
  app.appendChild(scroll);

  // ── BOTTOM NAV ──
  const nav = el("div",{style:{position:"fixed",bottom:"0",left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"480px",background:WHITE,borderTop:`1.5px solid ${BORDER_C}`,display:"grid",gridTemplateColumns:"repeat(4,1fr)",zIndex:"300"}});
  [["🏠","Home","home"],["📂","Categories","cats"],["🛒","Cart","cart"],["👤","Account","account"]].forEach(([icon,label,tab]) => {
    const btn = el("button",{style:{background:"none",border:"none",padding:"12px 0 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}});
    const iconWrap = el("div",{style:{position:"relative"}});
    iconWrap.appendChild(el("span",{style:{fontSize:"22px"}},icon));
    if (tab==="cart" && state.cartCount>0) {
      iconWrap.appendChild(el("div",{style:{position:"absolute",top:"-4px",right:"-6px",width:"16px",height:"16px",borderRadius:"50%",background:ORANGE,color:WHITE,fontSize:"9px",fontWeight:"900",display:"flex",alignItems:"center",justifyContent:"center"}},String(state.cartCount)));
    }
    btn.appendChild(iconWrap);
    btn.appendChild(el("span",{style:{fontSize:"10px",fontWeight:"700",color:state.activeTab===tab?PRIMARY:MUTED}},label));
    if (state.activeTab===tab) btn.appendChild(el("div",{style:{width:"20px",height:"3px",borderRadius:"2px",background:PRIMARY}}));
    btn.addEventListener("click", () => {
      setState({activeTab:tab});
      if (tab==="account" && !state.wallet) setState({showWallet:true});
      if (tab==="account" && state.wallet && state.merchantStatus==="approved") setState({showMerchDash:true});
    });
    nav.appendChild(btn);
  });
  app.appendChild(nav);

  // ── MODALS ──
  if (state.showWallet) app.appendChild(WalletModal());
  if (state.showMerchant && state.wallet) app.appendChild(MerchantModal());
  if (state.selectedProduct) app.appendChild(ProductModal());
  if (state.showAdminLogin) app.appendChild(AdminLoginModal());
}

// ── Timers ─────────────────────────────────────────────────────────────────
setInterval(() => {
  state.countdown = Math.max(0, state.countdown - 1);
  // Re-render silently for countdown (no full re-render storm)
  const timeBoxes = document.querySelectorAll('[data-timebox]');
  // We just do a lightweight tick here
  render();
}, 1000);

setInterval(() => {
  state.bannerIdx = (state.bannerIdx + 1) % BANNERS.length;
  render();
}, 3500);

// Initial render
render();
</script>
</body>
</html>
